<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Docker</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 30px; 
            background: #f4f6f8; 
        }
        
        h1 { 
            color: #1f4e78; 
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px; 
        }

        .card { 
            background: white; 
            padding: 16px; 
            border-radius: 10px; 
            box-shadow: 0 2px 8px rgba(0,0,0,.08); 
        }

        button { 
            padding: 10px 14px; 
            border: none; 
            background: #2f75b5; 
            color: white; 
            border-radius: 6px; 
            cursor: pointer; 
        }

        pre { 
            white-space: pre-wrap; 
        }
    </style>
</head>
<body>
    <h1>Projeto Docker Compose</h1>
    <p>Clique nos botões para consultar cada backend.</p>
    
    <div class="grid">
        <div class="card">
            <button onclick="loadApi('http://localhost:5001/')">Backend 1</button>
            <pre id="r1"></pre>
        </div>
        <div class="card">
            <button onclick="loadApi('http://localhost:5002/')">Backend 2</button>
            <pre id="r2"></pre>
        </div>
        <div class="card">
            <button onclick="loadApi('http://localhost:5003/')">Backend 3</button>
            <pre id="r3"></pre>
        </div>
        <div class="card">
            <button onclick="loadApi('http://localhost:5004/')">Backend 4</button>
            <pre id="r4"></pre>
        </div>
        <div class="card">
            <button onclick="loadApi('http://localhost:5005/')">Backend 5</button>
            <pre id="r5"></pre>
        </div>
    </div>

    <script>
        async function loadApi(url) {
            const map = {
                'http://localhost:5001/': 'r1',
                'http://localhost:5002/': 'r2',
                'http://localhost:5003/': 'r3',
                'http://localhost:5004/': 'r4',
                'http://localhost:5005/': 'r5'
            };
            
            const target = document.getElementById(map[url]);
            target.textContent = 'Carregando...';
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                target.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                target.textContent = 'Erro ao acessar a API: ' + error;
            }
        }

        // NOVO: Executa essas chamadas automaticamente assim que a página carregar
        window.addEventListener('DOMContentLoaded', () => {
            loadApi('http://localhost:5001/');
            loadApi('http://localhost:5002/');
            loadApi('http://localhost:5003/');
            loadApi('http://localhost:5004/');
            loadApi('http://localhost:5005/');
        });
    </script>
</body>
</html>
